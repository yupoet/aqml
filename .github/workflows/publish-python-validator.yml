name: Publish Python Validator

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Target package index"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi
  push:
    tags:
      - "validator-v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      - name: Build artifacts
        run: python -m build

      - name: Check distributions
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  publish-testpypi:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.repository == 'testpypi'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    if: startsWith(github.ref, 'refs/tags/validator-v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.repository == 'pypi')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
